        async function autoSyncChips(symbol, netBuy, date) {

            if (window.isSyncing) {
                console.warn("系統同步中，攔截請求:", symbol);
                return;
            }

            window.isSyncing = true; // 上鎖
            console.log("開始同步繪圖資料...");

            const GAS_URL = 'https://script.google.com/macros/s/AKfycbzghfVw1UF3cVid3aF_YicYUCJodZoSFrAtW5FvV0rMOxkHHsQVWVEtz_h6FQ7bdlOl/exec';
            console.log("嘗試執行自動同步...");
            try {
                const params = new URLSearchParams({ symbol: symbol, t: Date.now() });
                const response = await fetch(GAS_URL + '?' + params.toString());

                const data = await response.json();
                console.log("同步完成，直接繪圖:", data);

                if (Array.isArray(data)) {
                    console.log("同步完成，執行繪圖。資料筆數:", data.length);
                    updateChipsChart(data.map(d => d.date), data.map(d => parseFloat(d.netBuy)));
                }
            } catch (e) {
                console.error("自動同步失敗:", e);
            } finally {
                setTimeout(() => {
                    window.isSyncing = false;
                }, 1000);
            }
        }

        // 1. 初始化圖表的函數
        function initChart() {
            try {  
                var canvas = document.getElementById('priceChart');
                if (!canvas) {
                    console.error("找不到 ID 為 priceChart 的 canvas 元素！");
                    return;
                }

                var ctx = canvas.getContext('2d');

                console.log("嘗試初始化圖表...");

                window.priceChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: [],
                        datasets: [{
                            label: '股價走勢',
                            data: [],
                            borderColor: '#2563eb',
                            tension: 0.1
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false
                    }
                });
                console.log("圖表初始化成功！");
            } catch (e) {
                console.error("圖表初始化失敗，原因：", e);
            }
        }
        function initChipsChart() {
            try {
                var canvas = document.getElementById('chipsChart');
                if (!canvas) return;
                var ctx = canvas.getContext('2d');
                window.chipsChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: [],
                        datasets: [{
                            label: '法人買賣超 (張)',
                            data: [],
                            backgroundColor: [] // 將會根據正負數動態變色
                        }]
                    },
                    options: { 
                        responsive: true, 
                        maintainAspectRatio: false, 
                        scales: { 
                            y: { beginAtZero: true } 
                        }
                    }   
                });
                console.log("法人籌碼圖初始化成功！");
            } catch (e) {
                console.error("籌碼圖初始化失敗:", e);
            }
        }
            function updateChipsChart(labels, dataArray) {
                if (!window.chipsChart) return;

                window.chipsChart.data.labels = labels;
                window.chipsChart.data.datasets[0].data = dataArray;
                window.chipsChart.data.datasets[0].backgroundColor = dataArray.map(v => v >= 0 ? 'red' : 'green');

                window.chipsChart.update('none');
                console.log("法人籌碼圖已更新，共 " + dataArray.length + " 筆數據");
            }

            // 2. 確保頁面載入後自動呼叫初始化
            document.addEventListener('DOMContentLoaded', function() {
                initChart();
                initChipsChart();
                initWatchlist();
                applySettings();
            });

        window.onload = function() { initWatchlist(); applySettings(); };

        function showTip(type) {
            var msgs = {
                'bias': "💡 什麼是乖離率？\n代表今天股價離這一個月的平均成本（月線）有多遠。\n正太多（如 > 10%）代表大家都賺很多了，隨時有人想賣，新手不要亂追高！\n負太多（如 < -10%）代表跌得很誇張，可能有人斷頭拋售。",
                'position': "💡 什麼是近3個月位階？\n把過去三個月的最高價設為100%、最低價設為0%。\n如果超過75%代表現在是相對高點；低於25%代表是相對低點。",
                'vol': "💡 什麼是成交量比？\n今天預估的成交量除以過去5天的平均量。\n大於1.5倍代表今天這檔股票很熱門、有人在買賣。如果小於1倍代表今天大家對它沒興趣。"

        function changeFontSize(step) {
            currentFontSize += step;
            if(currentFontSize < 12) currentFontSize = 12;
            if(currentFontSize > 22) currentFontSize = 22;
            document.documentElement.style.setProperty('--base-font-size', currentFontSize + 'px');
        }

        function changeChartSize(step) {
            console.log("當前繪製資料筆數:", globalValidData.length);
            currentChartHeight += step;
            if(currentChartHeight < 120) currentChartHeight = 120;
            if(currentChartHeight > 400) currentChartHeight = 400;
            document.documentElement.style.setProperty('--chart-height', currentChartHeight + 'px');
            if(globalValidData.length > 0 && !isDrawing) {
                isDrawing = true;
                //window.requestAnimationFrame(function() {
                    //drawChart();
                    //isDrawing = false;
                //});
            }
        }

        function applySettings() {
            document.documentElement.style.setProperty('--base-font-size', currentFontSize + 'px');
            document.documentElement.style.setProperty('--chart-height', currentChartHeight + 'px');
        }

        function initWatchlist() {
            try {
                var storedData = localStorage.getItem("twDirectStockMonitorV11");
                if (storedData) { myWatchlist = JSON.parse(storedData); } 
                else {
                    myWatchlist = [
                        { symbol: "2330", name: "台積電", userNotes: "", userCost: "" },
                        { symbol: "2317", name: "鴻海", userNotes: "", userCost: "" }
                    ];
                }
            } catch(e) { myWatchlist = []; }
            renderWatchlist();
        }

        function renderWatchlist() {
            var sel = document.getElementById("selWatchlist");
            sel.options.length = 1;
            for (var i = 0; i < myWatchlist.length; i++) {
                var opt = document.createElement("option");
                opt.value = myWatchlist[i].symbol;
                opt.text = myWatchlist[i].symbol + " (" + myWatchlist[i].name + ")";
                sel.appendChild(opt);
            }
        }

        function loadFromWatchlist() {
            var sel = document.getElementById("selWatchlist");
            if (sel.value !== "") {
                document.getElementById("txtSymbol").value = sel.value;
                for(var i=0; i<myWatchlist.length; i++) {
                    if(myWatchlist[i].symbol === sel.value) {
                        document.getElementById("txtNotes").value = myWatchlist[i].userNotes || "";
                        document.getElementById("txtUserCost").value = myWatchlist[i].userCost || "";
                        break;
                    }
                }
                fetchData();
            }
        }

        function addToWatchlist() {
            var sym = document.getElementById("txtSymbol").value.replace(/^\s+|\s+$/g, '').toUpperCase().split('.')[0];
            var notes = document.getElementById("txtNotes").value;
            var cost = document.getElementById("txtUserCost").value.trim();
            if (sym === "") { alert("請先輸入股票代號！"); return; }
            var name = document.getElementById("lblCompanyName").innerText;
            if (name.indexOf("解析") !== -1 || name === "等待抓取..." || name === "查無資料") name = "自選股";
            
            if(notes.trim() !== "") {
                document.getElementById("autoMoatBox").innerHTML = notes.replace(/\n/g, "<br>");
            }

            for (var i = 0; i < myWatchlist.length; i++) {
                if (myWatchlist[i].symbol === sym) {
                    myWatchlist[i].name = name; 
                    myWatchlist[i].userNotes = notes; 
                    myWatchlist[i].userCost = cost;
                    saveData(); renderWatchlist();
                    document.getElementById("selWatchlist").value = sym;
                    alert("✅ 已成功儲存該股自訂筆記與持股成本！"); return;
                }
            }
            myWatchlist.push({ symbol: sym, name: name, userNotes: notes, userCost: cost });
            saveData(); renderWatchlist();
            document.getElementById("selWatchlist").value = sym;
            alert("✅ 成功加入自選股庫！");
        }

        function removeFromWatchlist() {
            var sym = document.getElementById("selWatchlist").value;
            if (sym === "") return;
            if (confirm("確定要刪除此代號與筆記嗎？")) {
                myWatchlist = myWatchlist.filter(function(item){ return item.symbol !== sym; });
                saveData(); renderWatchlist();
                document.getElementById("txtNotes").value = "";
                document.getElementById("txtUserCost").value = "";
                document.getElementById("autoMoatBox").innerHTML = "等待抓取...";
                document.getElementById("holdingStrategyBox").style.display = "none";
            }
        }

        function saveData() {
            try { localStorage.setItem("twDirectStockMonitorV11", JSON.stringify(myWatchlist)); } catch(e){}
        }


        function generateAIReport(cPrice, cOpen, cHigh, cLow, estVol, avgVol, ma5, ma20, positionRatio) {
            var bias20 = ((cPrice - ma20) / ma20) * 100;
            var body = Math.abs(cPrice - cOpen);
            var upperShadow = cHigh - Math.max(cPrice, cOpen);
            var lowerShadow = Math.min(cPrice, cOpen) - cLow;

            var report = "<div>";
            report += "<strong>📊 位階與乖離率：</strong><span class='tip-tag' onclick='showTip(\"position\")'>位階?</span> <span class='tip-tag' onclick='showTip(\"bias\")'>乖離率?</span><br>股價處於近3個月相對位階的 " + positionRatio.toFixed(1) + "% (" + (positionRatio > 75 ? "高檔超買區" : (positionRatio < 25 ? "低檔超賣區" : "中軌震盪區")) + ")。與月線(20MA)相對乖離率為 " + bias20.toFixed(2) + "%。";
            
            report += "<br><br><strong>🕯️ 今日K線型態：</strong><br>";
            if (upperShadow > body * 1.5 && upperShadow > cPrice * 0.008) report += "留下實體大於上影線之避雷針，上方高檔解套或獲利拋壓沈重。";
            else if (lowerShadow > body * 1.5 && lowerShadow > cPrice * 0.008) report += "下影線極長，低檔買盤防守積極，探底後具備支撐力道。";
            else if (cPrice > cOpen && body > cPrice * 0.015) report += "大實體紅K棒多方發動攻擊，多頭占盡優勢。";
            else report += "多空震盪收窄，K線呈現十字星或短實體，等待市場放量表態。";
            
            report += "<br><br><strong>🤖 AI 策略防守研判：</strong><br>";
            if (cPrice > ma20 && estVol >= avgVol * 1.7 && cPrice >= cOpen) report += "<span style='color:#b91c1c; font-weight:bold;'>【帶量強勢突破】</span>價量齊揚，屬於標準突破追擊訊號。多單以今日低點 " + cLow.toFixed(2) + " 元或5日線作波段防守點。";
            else if (cPrice < ma20) report += "<span style='color:#64748b; font-weight:bold;'>【弱勢空頭格局】</span>受制於均線反壓之下。中線趨勢偏弱，空手者應多看少動，切勿進場盲目接刀。";
            else report += "<span style='color:#0284c7; font-weight:bold;'>【量縮常態整理】</span>站穩月線之上，但缺乏波段攻擊量，預期將進行高姿態箱型整理，可區間低吸。";
            report += "</div>"; return report;
        }

        function analyzeNextDayProbability(dataArray, ma5, ma20) {
            if (dataArray.length < 25) return { upProb: 50, totalPatterns: 0, reason: "歷史資料天數不足以建立統計特徵模型。" };
            var matchPatternCount = 0; var nextDayUpCount = 0;
            var todayIdx = dataArray.length - 1; var today = dataArray[todayIdx];
            var todayBody = today.close - today.open; var todayIsRed = todayBody >= 0; var todayVol = today.vol;
            
            var sumV = 0; for(var m=todayIdx; m>todayIdx-5; m--) sumV += dataArray[m].vol;
            var todayAvgV = sumV / 5; var todayVolRatio = todayVol / todayAvgV;

            for (var i = 20; i < dataArray.length - 1; i++) {
                var htmlCur = dataArray[i]; var htmlPrevSumV = 0;
                for(var n=i; n>i-5; n--) htmlPrevSumV += dataArray[n].vol;
                var htmlAvgV = htmlPrevSumV / 5;
                var htmlBody = htmlCur.close - htmlCur.open; var htmlIsRed = htmlBody >= 0; var htmlVolRatio = htmlCur.vol / htmlAvgV;
                
                if (htmlIsRed === todayIsRed && Math.abs(htmlVolRatio - todayVolRatio) < 0.35) {
                    matchPatternCount++;
                    var htmlNextDay = dataArray[i + 1];
                    if (htmlNextDay.close > htmlCur.close) { nextDayUpCount++; }
                }
            }
            
            var trendWeight = 0;
            if (today.close > ma5 && ma5 > ma20) trendWeight = 5;
            if (today.close < ma5 && ma5 < ma20) trendWeight = -5;
            
            var finalProb = 50;
            if (matchPatternCount > 0) {
                finalProb = (nextDayUpCount / matchPatternCount) * 100;
                finalProb = finalProb * 0.7 + (50 + trendWeight) * 0.3;
            } else { finalProb = 50 + trendWeight; }
            
            if (finalProb > 85) finalProb = 85; if (finalProb < 15) finalProb = 15;
            
            var directionText = ""; var actionAdvice = "";
            if (finalProb >= 55) {
                directionText = "<span style='color:#ef4444; font-weight:bold;'>📈 偏多看漲</span> (預期上漲機率 " + finalProb.toFixed(1) + "%)";
                actionAdvice = "依據量價標籤回測，歷史上出現相似 K 線與量比結構時，隔日延續多頭慣性較強。短線操作可考慮於尾盤適度偏多卡位。";
            } else if (finalProb <= 45) {
                directionText = "<span style='color:#22c55e; font-weight:bold;'>📉 偏空看跌</span> (預期下跌機率 " + (100 - finalProb).toFixed(1) + "%)";
                actionAdvice = "量價型態顯示上方解套或逢高調節壓力顯著，歷史相似結構下隔日收黑機率較高。建議空手靜待回測，持股者不宜追高。";
            } else {
                directionText = "<span style='color:#64748b; font-weight:bold;'>⚖️ 區間多空拉鋸</span> (多空機率各半 " + finalProb.toFixed(1) + "%)";
                actionAdvice = "當前型態特徵在歷史上無明顯方向性特徵，隔日走勢容易受大盤震盪影響，建議維持既有波段策略，不急於短線無方向性押注。";
            }
            
            return { probHtml: directionText, advice: actionAdvice, totalPatterns: matchPatternCount, score: finalProb };
        }

function parseNews(htmlText) {
    var newsList = document.getElementById("newsList");
    var newsContainer = document.getElementById("newsContainer");
    if (!newsList) return;
    
    newsList.innerHTML = "";
    
    // 使用 DOMParser 將字串轉為可查詢的 DOM 物件
    var parser = new DOMParser();
    var doc = parser.parseFromString(htmlText, 'text/html');
    
    // 鎖定新聞列表區塊
    var items = doc.querySelectorAll('li, div.stream-item');
    var count = 0;
    
    items.forEach(function(item) {
        var a = item.querySelector('h3 a');
        if (a && count < 6) {
            var href = a.getAttribute('href');
            var title = a.innerText.trim();
            
            // 【關鍵修改】：嘗試從 time 標籤的 datetime 屬性中抓取日期
            var timeEl = item.querySelector('time');
            var dateStr = "即時新聞";
            if (timeEl && timeEl.getAttribute('datetime')) {
                // 將 ISO 格式 (2026-06-05T...) 轉為 YYYY-MM-DD
                dateStr = timeEl.getAttribute('datetime').split('T')[0];
            }
            
            if (href && href.includes('/news/') && title.length > 5) {
                var fullUrl = href.startsWith('http') ? href : 'https://tw.stock.yahoo.com' + href;
                
                newsList.innerHTML += `
                    <div style="margin-bottom:12px; border-bottom:1px solid #f1f5f9; padding-bottom:8px;">
                        <a href="${fullUrl}" target="_blank" style="color:#0369a1; text-decoration:none; font-size:0.95em; font-weight:bold; display:block;">
                            ${title}
                        </a>
                        <div style="font-size:0.75em; color:#64748b; margin-top:4px;">
                            📅 ${dateStr}
                        </div>
                    </div>`;
                count++;
            }
        }
    });
    
    newsContainer.style.display = (count > 0) ? "block" : "block";
    if (count === 0) newsList.innerHTML = "<div style='padding:10px; color:#666;'>目前無即時新聞內容。</div>";
}

function evalHoldingStrategy(cPrice, cLow, ma20, trendType) {

    if(costStr === "" || isNaN(costStr)) { box.style.display = "none"; return; }
    
    var cost = parseFloat(costStr);
    var returnRate = ((cPrice - cost) / cost) * 100;
    var isProfit = (returnRate >= 0);
    
    var titleText = isProfit ? "💰 目前持股狀態：【獲利中 (報酬率: +" + returnRate.toFixed(1) + "%)】" : "⚠️ 目前持股狀態：【套牢中 (報酬率: " + returnRate.toFixed(1) + "%)】";
    var color = isProfit ? "#e53e3e" : "#38a169";
    var actionText = "";

    if(isProfit) {
        if(trendType === "bull") {
            actionText = "👉 <strong>建議：【續抱】</strong>目前多頭主升段，防守月線(" + ma20.toFixed(1) + ")與今日低點(" + cLow.toFixed(1) + ")，利潤奔跑。";

        }
    } else {
        if(returnRate <= -7.0) {
            color = "#e53e3e";
            actionText = "🚨 <strong>建議：【嚴格停損】</strong>虧損已達 7%，請果斷出清保留資金實力。";
        } else if(trendType === "bear") {
            actionText = "🚨 <strong>建議：【反彈快售】</strong>趨勢轉弱，利用反彈機會降低部位。";

            actionText = "👉 <strong>建議：【暫時續抱】</strong>以月線(" + ma20.toFixed(1) + ")作為最後防守點。";
        }
    }
    if(isProfit && returnRate >= 10.0) {
        actionText += "<br><span style='color:#d97706; font-weight:bold;'>✨ 已達標 10% 獲利目標，建議檢查是否分批入袋。</span>";      
    }
    
    box.innerHTML = "<div class='auto-info-title' style='color:" + color + ";'>" + titleText + "</div><p style='margin:6px 0;'>" + actionText + "</p>";
    box.style.borderLeftColor = color;

            return (sum / days);
        }

        function processIndicators() {
            var dataLen = globalValidData.length; 
            var currentData = globalValidData[dataLen - 1];
            var cPrice = currentData.close; 
            var cOpen = currentData.open; 
            var cHigh = currentData.high; 
            var cLow = currentData.low;
            var actualVol = Math.floor(currentData.vol / 1000);
            var ma5 = getMA(5); 
            var ma20 = getMA(20);

            var now = new Date(); var h = now.getHours(); var m = now.getMinutes();
            var isTrading = (h === 9 && m >= 0) || (h > 9 && h < 13) || (h === 13 && m <= 30);
            var elapsedMins = (h - 9) * 60 + m; var estVol = actualVol; var volLabel = "今日實量";
            
            if (isTrading && elapsedMins > 0 && elapsedMins <= 270) {
                estVol = Math.floor(actualVol * (270 / elapsedMins)); volLabel = "盤中估量";
            }
            var sumVol5 = 0; for(var j = dataLen - 1; j >= dataLen - 5; j--) sumVol5 += globalValidData[j].vol;
            var avgVol = Math.floor((sumVol5 / 5) / 1000);
            var maxHigh20 = 0; for(var k = dataLen - 2; k >= dataLen - 21; k--) { if(globalValidData[k] && globalValidData[k].high > maxHigh20) maxHigh20 = globalValidData[k].high; }

            document.getElementById("txtPrice").value = cPrice.toFixed(2); 
            document.getElementById("txtOpen").value = cOpen.toFixed(2);
            document.getElementById("txtLow").value = cLow.toFixed(2); 
            document.getElementById("lblVolType").innerText = volLabel + "：";
            document.getElementById("txtVol").value = estVol; 
            document.getElementById("txtAvgVol").value = avgVol;
            document.getElementById("txtHighPrice").value = maxHigh20 > 0 ? maxHigh20.toFixed(2) : cHigh.toFixed(2); 
            document.getElementById("txtMA20").value = ma20.toFixed(2);
            
            var volRatio = (avgVol > 0) ? (estVol / avgVol).toFixed(1) : 0;
            var isBreakout = (cPrice >= maxHigh20); 
            var isRedCandle = (cPrice >= cOpen);
            var isBullish = (ma5 > ma20 && cPrice > ma5); 
            var isBearish = (cPrice < ma20);
            var volLevelText = (volRatio < 1.2) ? "量縮整理" : ((volRatio < 2.0) ? "溫和放量" : "攻擊爆量");
            var borderColor = "#cbd5e1"; 
            var summaryTitle = "";
            
            if (isBreakout && volRatio >= 1.8) { borderColor = "#dc2626"; summaryTitle = "🎯 強勢帶量過高突破 (波段起漲點)"; } 
            else if (volRatio >= 2.0 && !isBreakout) { borderColor = "#2563eb"; summaryTitle = "👀 底部異動：爆量結構醞釀中"; } 
            else if (isBreakout && volRatio < 1.0) { borderColor = "#7c3aed"; summaryTitle = "⚠️ 嚴重量價背離 (高檔無量誘多)"; } 
            else if (isBreakout && volRatio < 1.8) { borderColor = "#7c3aed"; summaryTitle = "🛑 無量過高假突破"; }
            else { borderColor = "#475569"; summaryTitle = "☕ 縮量常態盤整區間"; }

            var analysisHTML = "<div class='result-title' style='color:" + borderColor + ";'>" + summaryTitle + "</div>";
            analysisHTML += "<ul class='analysis-list'>";
            analysisHTML += "<li><strong>技術指標：</strong> " + (isBullish ? "<span class='badge bg-red'>多頭排列</span>" : (isBearish ? "<span class='badge bg-green'>破線轉弱</span>" : "<span class='badge bg-gray'>結構盤整</span>")) + " " + (isRedCandle ? "<span class='badge bg-red'>紅K線</span>" : "<span class='badge bg-green'>黑K線</span>") + "</li>";
            analysisHTML += "<li><strong>量能狀況：</strong> " + volLevelText + " (" + volRatio + "倍均量)。<span class='tip-tag' onclick='showTip(\"vol\")'>這是啥?</span></li>";

            var bias = ((cPrice - ma20) / ma20) * 100;
            if (bias > 12) {
                analysisHTML += "<li><span class='badge bg-red'>🚨 警示：乖離過大 (+" + bias.toFixed(1) + "%)，短線獲利賣壓強！</span></li>";
            } else if (bias < -10) {
                analysisHTML += "<li><span class='badge bg-green'>✨ 機會：乖離過大 (" + bias.toFixed(1) + "%)，留意反彈機會！</span></li>";
            } 

            if (isBreakout && volRatio < 1.0) {
                analysisHTML += "<li><strong style='color:#e53e3e;'>⚠️ 量價背離：</strong>無量創新高，主力誘多風險高！</li>";
            }

            analysisHTML += "</ul>";
            document.getElementById("lblResult").innerHTML = analysisHTML;
            document.getElementById("resultContainer").style.borderLeftColor = borderColor;
            
            var max3m = globalValidData[0].high; var min3m = globalValidData[0].low;
            for(var i=0; i<dataLen; i++) {
                if(globalValidData[i].high > max3m) max3m = globalValidData[i].high;
                if(globalValidData[i].low < min3m) min3m = globalValidData[i].low;
            }
            var positionRatio = (max3m === min3m) ? 50 : ((cPrice - min3m) / (max3m - min3m)) * 100;

            var aiReport = generateAIReport(cPrice, cOpen, cHigh, cLow, estVol, avgVol, ma5, ma20, positionRatio);
            document.getElementById("aiReportBox").innerHTML = aiReport;
            
            var predictResult = analyzeNextDayProbability(globalValidData, ma5, ma20);
            var predictHtml = "<strong>🔮 隔日走勢預測：</strong>" + predictResult.probHtml + "<br>";
            predictHtml += "（歷史相似型態樣本數：共符合 " + predictResult.totalPatterns + " 天交易特徵）<br><br>";
            predictHtml += "<strong>📝 隔日短線策略建議：</strong><br>" + predictResult.advice;
            document.getElementById("nextDayPredictBox").innerHTML = predictHtml;

            // 執行未來波段趨勢演算，並接收趨勢類型
            var trendType = analyzeMediumTrend(globalValidData, ma5, ma20);

            // 執行傻瓜溫度計
            generateNoviceDashboard(cPrice, ma20, parseFloat(volRatio), positionRatio);

            // 執行持股策略評估
            evalHoldingStrategy(cPrice, cLow, ma20, trendType);

        }
        // 大盤聯動分析邏輯
        function performMarketCorrelation(stockChangePercent, marketChange) {
            const sPercent = parseFloat(stockChangePercent).toFixed(2);
            const mPercent = parseFloat(marketChange).toFixed(2);

            const diff = parseFloat(sPercent) - parseFloat(mPercent);
            let analysis = "";
    
            // 判斷邏輯
            if (Math.abs(diff) < 0.5) {
                analysis = "同步大盤 (隨勢震盪)";
            } else if (diff > 1.0) {
                analysis = "強於大盤 (主力逆勢護盤)";
            } else if (diff < -1.0) {
                analysis = "弱於大盤 (避險賣壓沉重)";
            } else {
                analysis = diff > 0 ? "略強於大盤" : "略弱於大盤";
            }

            var mIndex = document.getElementById('marketIndex');
            var mTrend = document.getElementById('marketTrend');

            if(mIndex) {
                mIndex.innerHTML = `個股: <span style="color:blue;">${sPercent}%</span> | 大盤: <span style="color:red;">${mPercent}%</span>`;
            }
            if(mTrend) {
                mTrend.innerText = analysis;
            }

            // 自動將分析結果寫入 AI 診斷報告的最下方
            var aiBox = document.getElementById("aiReportBox");
            if(aiBox) {
                aiBox.innerHTML += `<br><br><div style="border-top:1px solid #ddd; padding-top:5px; font-size:0.9em; color:#475569;"><strong>🔍 大盤關聯診斷：</strong>今日個股 ${sPercent}%，大盤 ${mPercent}%。${analysis}。</div>`;
            }
        }
